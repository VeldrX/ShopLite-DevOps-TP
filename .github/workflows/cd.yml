name: CD

on:
  push:
    branches: [ develop, main, 'feature/*' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
    environment: staging
    env:
      DOCKERHUB_USERNAME: ${{ secrets.STAGING_DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (optional)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.STAGING_DOCKERHUB_TOKEN }}

      - name: Build and push API
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}
          # If this is a version tag (v*.*.*), also tag and push with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME
            docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME
          fi

      - name: Build API (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-api:${{ github.sha }} ./api
          # If this is a version tag (v*.*.*), also tag with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag shoplite-api:${{ github.sha }} shoplite-api:$TAG_NAME
          fi

      - name: Build and push Frontend
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}
          # If this is a version tag (v*.*.*), also tag and push with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME
            docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME
          fi

      - name: Build Frontend (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-frontend:${{ github.sha }} ./frontend
          # If this is a version tag (v*.*.*), also tag with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag shoplite-frontend:${{ github.sha }} shoplite-frontend:$TAG_NAME
          fi

      - name: Deploy to staging
        run: |
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DOCKERHUB_USERNAME: ${{ secrets.PROD_DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (optional)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.PROD_DOCKERHUB_TOKEN }}

      - name: Build and push API
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}
          # If this is a version tag (v*.*.*), also tag and push with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME
            docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME
          fi

      - name: Build API (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-api:${{ github.sha }} ./api
          # If this is a version tag (v*.*.*), also tag with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag shoplite-api:${{ github.sha }} shoplite-api:$TAG_NAME
          fi

      - name: Build and push Frontend
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}
          # If this is a version tag (v*.*.*), also tag and push with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME
            docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME
          fi

      - name: Build Frontend (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-frontend:${{ github.sha }} ./frontend
          # If this is a version tag (v*.*.*), also tag with the version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag shoplite-frontend:${{ github.sha }} shoplite-frontend:$TAG_NAME
          fi

      - name: Deploy to production
        run: |
          docker compose -f docker-compose.yml up -d

