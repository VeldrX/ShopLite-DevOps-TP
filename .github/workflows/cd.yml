name: CD

on:
  push:
    branches: [ develop ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (optional)
        if: ${{ ne(secrets.DOCKERHUB_USERNAME, '') }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}
          else
            docker build -t shoplite-api:${{ github.sha }} ./api
          fi

      - name: Build and push Frontend
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}
          else
            docker build -t shoplite-frontend:${{ github.sha }} ./frontend
          fi

      - name: Deploy to staging
        run: |
          cd infra
          docker compose -f ../docker-compose.staging.yml up -d
