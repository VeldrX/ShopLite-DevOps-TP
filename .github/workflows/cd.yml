name: CD

on:
  push:
    branches: [ develop ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
    environment: staging
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (optional)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}

      - name: Build API (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-api:${{ github.sha }} ./api

      - name: Build and push Frontend
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}

      - name: Build Frontend (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          docker build -t shoplite-frontend:${{ github.sha }} ./frontend

      - name: Deploy to staging
        run: |
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

