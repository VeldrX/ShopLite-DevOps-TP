name: CD

on:
  push:
    branches: [ develop, main, 'feature/*' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    env:
      DOCKERHUB_USERNAME: ${{ secrets.STAGING_DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.STAGING_DOCKERHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate .env.staging
        run: |
          echo "NODE_ENV=staging" > .env.staging
          echo "HTTP_PORT=8081" >> .env.staging
          echo "API_PORT=3000" >> .env.staging
          echo "APP_VERSION=staging-starter" >> .env.staging
          echo "POSTGRES_DB=shoplite_staging" >> .env.staging
          echo "POSTGRES_USER=shoplite_staging" >> .env.staging
          echo "POSTGRES_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}" >> .env.staging
          echo "DATABASE_URL=postgres://shoplite_staging:${{ secrets.STAGING_DB_PASSWORD }}@db:5432/shoplite_staging" >> .env.staging
          echo "LOG_LEVEL=info" >> .env.staging

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push API
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}

      - name: Build API (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: docker build -t shoplite-api:${{ github.sha }} ./api

      - name: Build and push Frontend
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}

      - name: Build Frontend (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: docker build -t shoplite-frontend:${{ github.sha }} ./frontend

      - name: Deploy to staging
        run: |
          docker compose --project-name shoplite-staging --env-file .env.staging \
            -f docker-compose.yml -f docker-compose.staging.yml up -d

      - name: Smoke test staging
        run: |
          sleep 15
          BASE_URL=http://localhost:8081 sh scripts/smoke-test.sh

      - name: Log deployment
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate .env.prod
        run: |
          echo "NODE_ENV=production" > .env.prod
          echo "HTTP_PORT=8082" >> .env.prod
          echo "API_PORT=3000" >> .env.prod
          echo "APP_VERSION=${{ github.ref_name }}" >> .env.prod
          echo "POSTGRES_DB=shoplite_prod" >> .env.prod
          echo "POSTGRES_USER=shoplite_prod" >> .env.prod
          echo "POSTGRES_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env.prod
          echo "DATABASE_URL=postgres://shoplite_prod:${{ secrets.PROD_DB_PASSWORD }}@db:5432/shoplite_prod" >> .env.prod
          echo "LOG_LEVEL=warn" >> .env.prod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub (optional)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} ./api
          docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }} \
            ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-api:$TAG_NAME

      - name: Build API (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          docker build -t shoplite-api:${{ github.sha }} ./api
          docker tag shoplite-api:${{ github.sha }} shoplite-api:$TAG_NAME

      - name: Build and push Frontend
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} ./frontend
          docker tag ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }} \
            ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/shoplite-frontend:$TAG_NAME

      - name: Build Frontend (local only)
        if: ${{ env.DOCKERHUB_USERNAME == '' }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          docker build -t shoplite-frontend:${{ github.sha }} ./frontend
          docker tag shoplite-frontend:${{ github.sha }} shoplite-frontend:$TAG_NAME

      - name: Deploy to production
        run: |
          docker compose --project-name shoplite-prod --env-file .env.prod \
            -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Smoke test production
        run: |
          sleep 15
          BASE_URL=http://localhost:8082 sh scripts/smoke-test.sh

      - name: Log deployment
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
